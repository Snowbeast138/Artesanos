name: Distribución a Firebase QA

# Se ejecuta cada vez que haces un 'push' a la rama principal (main)
on:
  push:
    branches:
      - master

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Clonar Repositorio
        uses: actions/checkout@v3

      # 2. Configurar Java para Android
      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Dar permisos al Wrapper de Gradle
      - name: Dar permisos de ejecución a gradlew
        run: chmod +x ./gradlew

      # 4. Compilar la aplicación (Construir el APK)
      - name: Construir APK Debug
        run: ./gradlew assembleDebug

      # 5. Distribuir a Firebase App Distribution
      - name: Subir a Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "1:175955122341:android:9b5f021bf370f8cf8f954c"
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: qa-team
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Nueva versión de prueba enviada automáticamente por CI/CD"
